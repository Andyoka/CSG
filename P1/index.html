<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi 1 - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #sidebar { transition: all 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .main-content { transition: margin-left 0.3s ease-in-out; }
        
        .text-neon-green { color: #558a68; }
        .bg-neon-green { background-color: #558a68; }
        .border-neon-green { border-color: #558a68; }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-x-hidden">

    <!-- MODAL LOGIN FIREBASE (Akan muncul jika belum login) -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900 bg-opacity-95 z-[100] flex items-center justify-center p-4">
        <div class="bg-[#1e293b] text-white p-8 rounded-xl shadow-2xl max-w-md w-full border border-slate-700 text-center">
            <div class="mb-6">
                <div class="inline-block border-2 border-neon-green rounded-md py-1 px-3 mb-2">
                    <span class="text-xs font-black uppercase tracking-wider text-neon-green">PRODUKSI 1</span>
                </div>
                <h2 class="text-2xl font-bold text-white">Akses Dashboard</h2>
                <p class="text-gray-400 text-xs mt-1">Silakan masuk menggunakan akun Google terdaftar.</p>
            </div>

            <!-- Pesan Error / Akses Ditolak -->
            <div id="authError" class="hidden mb-4 p-3 bg-red-900/50 border border-red-500 rounded text-red-200 text-xs text-left">
            </div>

            <button id="btnLogin" onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-gray-800 hover:bg-gray-100 font-bold py-3 px-4 rounded-lg transition shadow-md">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-56 bg-[#1e293b] text-white z-50 shadow-2xl flex flex-col justify-between">
        <div>
            <div class="p-6">
                <div class="border-2 border-neon-green rounded-md py-1 px-2 text-center">
                    <span class="text-sm font-black uppercase tracking-tighter text-neon-green">PRODUKSI 1</span>
                </div>
            </div>
            
            <nav class="mt-2 px-2">
                <a href="index.html" class="flex items-center py-2 px-4 mb-1 bg-neon-green text-black font-bold rounded-md">
                    Home
                </a>
                
                <a href="cs.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 transition rounded-md text-gray-400 hover:text-white">
                    Cold Storage
                </a>
                
                <a href="fj.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 transition rounded-md text-gray-400 hover:text-white">
                    Fish Juice
                </a>
                
                <a href="fm.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 transition rounded-md text-gray-400 hover:text-white">
                    Fish Meal
                </a>
                
                <a href="rm.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 transition rounded-md text-gray-400 hover:text-white">
                    Raw Material
                </a>
            </nav>
        </div>

        <!-- INFO USER & TOMBOL LOGOUT (Bagian bawah sidebar) -->
        <div class="p-4 border-t border-slate-700 bg-slate-900/50">
            <div class="text-xs text-gray-400 truncate mb-1" id="userEmailDisplay">Loading user...</div>
            <button onclick="logout()" class="w-full text-left text-xs text-red-400 hover:text-red-300 font-bold flex items-center gap-1">
                🚪 Logout
            </button>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main id="mainContent" class="ml-56 p-4 main-content">
        <header class="flex justify-between items-center mb-6 bg-[#1e293b] text-white p-3 rounded-lg shadow-md">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="bg-slate-700 p-2 rounded mr-4 hover:bg-slate-600">
                    <span class="text-xs">☰ Menu</span>
                </button>
                <div>
                    <h1 class="text-xl font-bold inline-block">Dashboard Produksi 1</h1>
                    <span class="ml-2 text-neon-green font-bold">Home</span>
                </div>
            </div>
            <div class="text-xs font-mono text-gray-300">
                24/2/2026, 12.15
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-[#2d3748] p-4 rounded-lg shadow-lg border-t-4 border-neon-green">
                <h3 class="text-white font-bold mb-4 flex justify-between">
                    Graph Produksi Harian <span class="text-gray-500 text-xs">⚙️</span>
                </h3>
                <div class="bg-[#1a202c] h-48 rounded flex items-center justify-center border border-gray-700">
                    <p class="text-gray-500 text-sm">Data grafik belum diisi</p>
                </div>
                <div class="mt-4 flex gap-2">
                    <button class="bg-gray-600 text-white px-3 py-1 rounded text-xs">Proses</button>
                    <button class="bg-gray-600 text-white px-3 py-1 rounded text-xs">Reset</button>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Cetak Laporan</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-lg shadow-lg border border-gray-200">
                <h3 class="text-slate-800 font-bold border-b pb-2 mb-4">Filter Data</h3>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" placeholder="Cari data..." class="bg-gray-100 border p-2 rounded text-sm w-full">
                        <button class="bg-neon-green text-black font-bold px-4 py-2 rounded text-sm">Filter</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPT FIREBASE AUTHENTICATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyADjRxfQAPb2CxWrijGuEDooAy2h5JS_VY",
            authDomain: "dashboard-cs-d7081.firebaseapp.com",
            projectId: "dashboard-cs-d7081",
            storageBucket: "dashboard-cs-d7081.firebasestorage.app",
            messagingSenderId: "1000730141765",
            appId: "1:1000730141765:web:e1ea71a1cd0d295d8a2f2c",
            measurementId: "G-4692N7H79T"
        };

        // ⚠️ DAFTAR EMAIL YANG DIBERI IZIN (Ganti / tambah email di sini)
        const ALLOWED_EMAILS = [
            "operationalcsati2@gmail.com" // <-- Masukkan email Google Anda di sini
        ];

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginModal = document.getElementById('loginModal');
        const authError = document.getElementById('authError');
        const userEmailDisplay = document.getElementById('userEmailDisplay');

        // Monitoring Sesi Login (Persist Otomatis)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Cek apakah email terdaftar di whitelist
                if (ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
                    loginModal.classList.add('hidden');
                    userEmailDisplay.innerText = user.email;
                } else {
                    // Jika email tidak terdaftar
                    showError(`Akses Ditolak: Email (${user.email}) tidak memiliki izin.`);
                    signOut(auth);
                }
            } else {
                // Jika belum login
                loginModal.classList.remove('hidden');
                userEmailDisplay.innerText = "Belum Login";
            }
        });

        // Fungsi Login Google
        window.loginWithGoogle = async function() {
            authError.classList.add('hidden');
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                showError("Gagal Login: " + error.message);
            }
        };

        // Fungsi Logout
        window.logout = function() {
            signOut(auth).then(() => {
                loginModal.classList.remove('hidden');
            });
        };

        function showError(msg) {
            authError.innerText = msg;
            authError.classList.remove('hidden');
        }
    </script>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            sidebar.classList.toggle('sidebar-closed');
            mainContent.style.marginLeft = sidebar.classList.contains('sidebar-closed') ? "0" : "14rem";
        }
    </script>
</body>
</html>
