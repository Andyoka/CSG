<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi 1 - Cold Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        #sidebar { transition: all 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .main-content { transition: margin-left 0.3s ease-in-out; }
        .chart-3d-effect { filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.15)); }
        .donut-card {
            background: white; border-radius: 1.25rem; padding: 1rem;
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.07);
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; min-height: 250px;
            transition: transform 0.2s ease; border: 1px solid #f1f5f9;
        }
        .special-wide-card { grid-column: span 2; align-items: stretch; overflow: hidden; }
        
        /* UKURAN BULATAN DONUT DIPERBESAR SECARA GLOBAL */
        .donut-container { position: relative; width: 110px; height: 110px; margin: 0 auto; }
        
        /* FIX ANGKA TOTAL PAS DI TENGAH DENGAN FONT LEBIH JELAS */
        .donut-inner-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px; font-weight: 900; color: #1e293b; text-align: center; line-height: 1.1;
        }
        .donut-inner-text span { font-size: 8px; color: #64748b; font-weight: bold; }

        .custom-legend {
            font-size: 9px; color: #64748b; text-align: center;
            width: 100%; padding-top: 5px; border-top: 1px dashed #e2e8f0;
        }
        .chart-table { width: 100%; border-collapse: collapse; font-size: 8px; color: #1e293b; }
        .chart-table th, .chart-table td { border: 1px solid #cbd5e1; padding: 2px; text-align: center; }
        .chart-table th { background-color: #f1f5f9; font-weight: bold; }
        .legend-box { width: 7px; height: 7px; display: inline-block; margin-right: 4px; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-x-hidden">

    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-56 bg-[#1e293b] text-white z-50 shadow-2xl">
        <div class="p-6 text-center border-b border-slate-700">
            <div class="border-2 border-[#4ade80] rounded-md py-1 px-2">
                <span class="text-sm font-black uppercase text-[#4ade80]">PRODUKSI 1</span>
            </div>
        </div>
        <nav class="mt-4 px-2 text-sm">
            <a href="index.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 rounded-md text-gray-400">🏠 Dashboard</a>
            <a href="cs.html" class="flex items-center py-2 px-4 mb-1 bg-[#4ade80] text-black font-bold rounded-md shadow-lg">❄️ Cold Storage</a>
        </nav>
    </aside>

    <main id="mainContent" class="ml-56 p-4 main-content">
        <header class="flex justify-between items-center mb-6 bg-[#1e293b] text-white p-3 rounded-xl border-l-4 border-[#4ade80] shadow-md">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="hover:text-[#4ade80]">☰ Menu</button>
                <h1 class="text-lg font-extrabold uppercase tracking-tight">Cold Storage <span class="text-[#4ade80]">Monitor</span></h1>
            </div>
            <button onclick="refreshAll()" class="bg-[#4ade80] text-black px-5 py-1.5 rounded-lg text-[10px] font-black hover:scale-95 transition">🔄 REFRESH DATA</button>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6">
            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-2 text-center">Small Fish Inventory (MT)</h4>
                <div class="flex items-center justify-center w-full h-full gap-4 px-2">
                    <div class="w-2/3 h-[140px]"><canvas id="barSmallHorizontal"></canvas></div>
                    <div class="flex-none"><div class="donut-container chart-3d-effect"><canvas id="chart1"></canvas><div id="text1" class="donut-inner-text">0<br><span>MT</span></div></div></div>
                </div>
                <div id="legend1" class="custom-legend mt-1">...</div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-1 text-center">Half Fishbox (Box)</h4>
                <div class="relative flex items-center justify-center w-full h-full gap-2 px-1">
                    <div id="legendHalfDetail" class="absolute top-0 left-0 text-[8px] font-black flex gap-2 pl-2 z-10">...</div>
                    
                    <div class="w-2/3 h-[110px] mt-4"><canvas id="lineHalfTrend"></canvas></div>
                    <div class="flex-none">
                        <div class="donut-container chart-3d-effect">
                            <canvas id="chartHalfDonut"></canvas>
                            <div id="textHalfTotal" class="donut-inner-text">0<br><span>BOX</span></div>
                        </div>
                    </div>
                </div>
                <div id="legendHalf" class="custom-legend mt-1 text-[8px]">...</div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-2 text-center">Occupancy Trend (%)</h4>
                <div class="flex items-center justify-center w-full h-full gap-6 px-4">
                    <div class="w-1/2 h-[100px]"><canvas id="lineOccupancyTrend"></canvas></div>
                    <div class="flex-none">
                        <div class="donut-container chart-3d-effect">
                            <canvas id="chart3"></canvas>
                            <div id="text3" class="donut-inner-text">0<br><span>%</span></div>
                        </div>
                    </div>
                </div>
                <div id="legend3" class="custom-legend mt-1">...</div>
            </div>

            <div class="donut-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase">Old Stock</h4>
                <div class="donut-container chart-3d-effect"><canvas id="chart2"></canvas><div id="text2" class="donut-inner-text">0<br><span>%</span></div></div>
                <div id="legend2" class="custom-legend">...</div>
            </div>
        </section>

        <div class="flex flex-col lg:flex-row gap-4 mb-6">
            <div class="w-full lg:w-[65%] bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-[10px] uppercase mb-4 text-slate-400 border-b pb-2">Main Stock Overview</h3>
                <div class="h-[250px] mb-4"><canvas id="mainBarChart"></canvas></div>
                <div class="overflow-x-auto"><table class="chart-table" id="dataTable"><thead><tr id="tableHeader"></tr></thead><tbody id="tableBody"></tbody></table></div>
            </div>
            <div class="w-full lg:w-[35%] flex flex-col gap-4">
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex-1">
                    <h4 class="text-center font-bold text-[9px] uppercase border-b mb-1">Total Stock</h4>
                    <div class="h-[120px] flex items-center justify-center"><canvas id="pieTotalChart"></canvas></div>
                    <div id="pieTotalLegend" class="mt-2 text-[9px]"></div>
                </div>
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex-1">
                    <h4 class="text-center font-bold text-[9px] uppercase border-b mb-1">Product Detail</h4>
                    <div class="h-[120px] flex items-center justify-center"><canvas id="pieDetailChart"></canvas></div>
                    <div id="pieDetailLegend" class="mt-2 grid grid-cols-2 text-[8px] max-h-[80px] overflow-y-auto"></div>
                </div>
            </div>
        </div>

        <iframe id="sheetFrame" src="" class="w-full h-[500px] border-none rounded-2xl shadow-lg bg-white"></iframe>
    </main>

    <script>
        const ID_GSHEET = "2PACX-1vShq3eIcceGMXuR6dBbMut6K99pAQZV4g86Aq5DWkP7yrFTGNMPkdfg4y6vbWeofWpFRO4gGNqLE4h8";
        const GID_SMALL_PIE = "1052774962", GID_SMALL_BAR = "1026658023";
        const GID_OLD = "885583216", GID_OCCUPANCY = "23039051";
        const GID_HALF = "972941295";
        const GID_BAR = "0", GID_TOTAL = "252078912", GID_DETAIL = "1764500224";
        const ID_LAPORAN = "2PACX-1vRQ6OPRqsuPRmTvAgsJNrU1ISOZ4x-0r1WSmpziuRNdecq42VVxgqferykNrUjJrB-KPWbt_NxgkpFk";

        Chart.register(ChartDataLabels);
        let charts = {};

        function cleanNum(val) {
            if(!val) return 0;
            let str = val.toString().replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '');
            return parseFloat(str) || 0;
        }

        // FUNGSI HALF FISHBOX (FIX Donut & Text Center)
        async function fetchHalfFishbox() {
            try {
                const t = new Date().getTime();
                const [respDonut, respLine] = await Promise.all([
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_HALF}&range=A1:B4&output=csv&t=${t}`),
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_HALF}&range=D2:E7&output=csv&t=${t}`)
                ]);

                // Donut logic (OK, Hold, Reject)
                const csvDonut = await respDonut.text();
                const rowsDonut = csvDonut.split('\n').map(r => r.split(','));
                const totalBox = cleanNum(rowsDonut[0][1]);
                const dataDonut = [cleanNum(rowsDonut[1][1]), cleanNum(rowsDonut[2][1]), cleanNum(rowsDonut[3][1])];

                const ctxDonut = document.getElementById('chartHalfDonut').getContext('2d');
                if(charts['halfDonut']) charts['halfDonut'].destroy();
                charts['halfDonut'] = new Chart(ctxDonut, {
                    type: 'doughnut',
                    data: {
                        labels: ['OK', 'Hold', 'Reject'],
                        datasets: [{ data: dataDonut, backgroundColor: ['#10b981', '#facc15', '#ef4444'], borderWidth: 0 }]
                    },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false } } }
                });
                // FIX ANGKA PAS DI TENGAH
                document.getElementById('textHalfTotal').innerHTML = `${totalBox}<br><span>BOX</span>`;
                
                document.getElementById('legendHalf').innerHTML = `<span class="text-green-600">OK: ${dataDonut[0]}</span> | <span class="text-yellow-600">Hold: ${dataDonut[1]}</span> | <span class="text-red-600">Reject: ${dataDonut[2]}</span>`;
                // OK=Hitam, Hold=Orange di Legend Kiri Atas
                document.getElementById('legendHalfDetail').innerHTML = `<span class="text-black font-black">OK: ${dataDonut[0]}</span> | <span class="text-orange-600 font-black">Hold: ${dataDonut[1]}</span>`;

                // Line logic (OK=Hitam, Hold=Orange)
                const csvLine = await respLine.text();
                const rowsLine = csvLine.split('\n').map(r => r.split(','));
                const dataOKLine = rowsLine.map(r => cleanNum(r[0])).reverse();
                const dataHoldLine = rowsLine.map(r => cleanNum(r[1])).reverse();

                const ctxLine = document.getElementById('lineHalfTrend').getContext('2d');
                if(charts['halfLine']) charts['halfLine'].destroy();
                charts['halfLine'] = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: dataOKLine.map(() => ''),
                        datasets: [
                            { data: dataOKLine, borderColor: '#1e293b', borderWidth: 3, pointRadius: 3, tension: 0.35, fill: false }, // OK=Hitam
                            { data: dataHoldLine, borderColor: '#f97316', borderWidth: 3, pointRadius: 3, tension: 0.35, fill: false } // Hold=Orange
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, datalabels: { display: false } },
                        scales: { x: { display: false }, y: { display: false } }
                    }
                });
            } catch (e) { console.error(e); }
        }

        // FUNGSI LAIN (TETAP SAMA)
        async function fetchSmallBar() {
            try {
                const t = new Date().getTime();
                const response = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_SMALL_BAR}&range=A2:B7&output=csv&t=${t}`);
                const csv = await response.text();
                const rows = csv.split('\n').map(r => r.split(','));
                const labels = rows.map(r => r[0]);
                const values = rows.map(r => cleanNum(r[1]));
                const ctx = document.getElementById('barSmallHorizontal').getContext('2d');
                if(charts['barSmallH']) charts['barSmallH'].destroy();
                charts['barSmallH'] = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ data: values, backgroundColor: '#1e293b', borderRadius: 4, barThickness: 10 }] },
                    options: {
                        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'right', color: '#1e293b', font: { size: 8, weight: 'bold' }, formatter: (val) => val + ' MT' } },
                        scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 7 } } } }
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function fetchOccupancyCombined() {
            try {
                const t = new Date().getTime();
                const [respPie, respLine] = await Promise.all([
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_OCCUPANCY}&range=A1:B3&output=csv&t=${t}`),
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_OCCUPANCY}&range=E2:E7&output=csv&t=${t}`)
                ]);
                const csvPie = await respPie.text();
                const rowsPie = csvPie.split('\n').map(r => r.split(','));
                let valPie = cleanNum(rowsPie[2][1]);
                let percent = valPie > 1 ? valPie / 100 : valPie;
                const ctxDonut = document.getElementById('chart3').getContext('2d');
                if(charts['chart3']) charts['chart3'].destroy();
                charts['chart3'] = new Chart(ctxDonut, {
                    type: 'doughnut',
                    data: { datasets: [{ data: [percent, 1-percent], backgroundColor: ['#10b981', '#1e293b'], borderWidth: 0, borderRadius: 2 }] },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false } } }
                });
                document.getElementById('text3').innerHTML = `${(percent * 100).toFixed(1)}<br><span>%</span>`;
                document.getElementById('legend3').innerHTML = `<div class="flex justify-between font-bold text-slate-700"><span>${rowsPie[0][0]}</span><span>${rowsPie[0][1]}</span></div><div class="flex justify-between"><span>${rowsPie[1][0]}</span><span>${rowsPie[1][1]}</span></div>`;

                const csvLine = await respLine.text();
                const valuesLine = csvLine.split('\n').map(r => cleanNum(r)).reverse();
                const minVal = Math.min(...valuesLine) - 1;
                const ctxLine = document.getElementById('lineOccupancyTrend').getContext('2d');
                if(charts['lineOcc']) charts['lineOcc'].destroy();
                charts['lineOcc'] = new Chart(ctxLine, {
                    type: 'line',
                    data: { labels: valuesLine.map(() => ''), datasets: [{ data: valuesLine, borderColor: '#10b981', borderWidth: 3, pointRadius: 4, tension: 0.4, fill: false }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { display: false }, y: { display: false, min: minVal } } }
                });
            } catch (e) { console.error(e); }
        }

        async function fetchDonutTop(gid, canvasId, textId, legendId) {
            try {
                const t = new Date().getTime();
                const response = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${gid}&range=A1:B3&output=csv&t=${t}`);
                const csv = await response.text();
                const rows = csv.split('\n').map(r => r.split(','));
                let val = cleanNum(rows[2][1]);
                let percent = val > 1 ? val / 100 : val;
                const color = (canvasId === 'chart1') ? '#f97316' : '#3b82f6';
                const ctx = document.getElementById(canvasId).getContext('2d');
                if(charts[canvasId]) charts[canvasId].destroy();
                charts[canvasId] = new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: [percent, 1-percent], backgroundColor: [color, '#1e293b'], borderWidth: 0, borderRadius: 2 }] },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false } } }
                });
                document.getElementById(textId).innerHTML = `${(percent * 100).toFixed(1)}<br><span>${canvasId==='chart1'?'MT':'%'}</span>`;
                document.getElementById(legendId).innerHTML = `<div class="flex justify-between font-bold text-slate-700"><span>${rows[0][0]}</span><span>${rows[0][1]}</span></div><div class="flex justify-between"><span>${rows[1][0]}</span><span>${rows[1][1]}</span></div>`;
            } catch (e) { console.error(e); }
        }

        async function fetchBottomCharts() {
            const t = new Date().getTime();
            const fetchCSV = (gid, range) => fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${gid}&range=${range}&output=csv&t=${t}`).then(r => r.text());
            try {
                const [csvB, csvT, csvD] = await Promise.all([fetchCSV(GID_BAR, "A1:N5"), fetchCSV(GID_TOTAL, "A1:C2"), fetchCSV(GID_DETAIL, "A1:I2")]);
                const rB = csvB.split('\n').map(r => r.split(','));
                const rT = csvT.split('\n').map(r => r.split(','));
                const rD = csvD.split('\n').map(r => r.split(','));
                const barLabels = rB[0].slice(1);
                const datasets = [
                    { l: rB[1][0], d: rB[1].slice(1).map(v=>cleanNum(v)), c: "#5b9bd5" },
                    { l: rB[2][0], d: rB[2].slice(1).map(v=>cleanNum(v)), c: "#ed7d31" },
                    { l: rB[3][0], d: rB[3].slice(1).map(v=>cleanNum(v)), c: "#a5a5a5" },
                    { l: rB[4][0], d: rB[4].slice(1).map(v=>cleanNum(v)), c: "#ffc000" }
                ];
                if(charts['mainBarChart']) charts['mainBarChart'].destroy();
                charts['mainBarChart'] = new Chart(document.getElementById('mainBarChart'), {
                    type: 'bar',
                    data: { labels: barLabels, datasets: datasets.map(s => ({ label: s.l, backgroundColor: s.c, data: s.d.map((v, i) => { let tot = datasets.reduce((a, b) => a + b.d[i], 0); return tot > 0 ? (v / tot) * 100 : 0; }) })) },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false }, legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 8 } } } }, scales: { y: { stacked: true, max: 100, ticks: { callback: v => v + '%' } }, x: { stacked: true, ticks:{font:{size:7}} } } }
                });
                document.getElementById('tableHeader').innerHTML = '<th class="border-r">Cat</th>' + barLabels.map(l=>`<th>${l}</th>`).join('');
                document.getElementById('tableBody').innerHTML = datasets.map(s => `<tr><td class="text-left font-bold border-r px-1"><span class="legend-box" style="background:${s.c}"></span>${s.l}</td>${s.d.map(v=>`<td>${v.toLocaleString('id-ID')}</td>`).join('')}</tr>`).join('');
                if(charts['pieTotalChart']) charts['pieTotalChart'].destroy();
                charts['pieTotalChart'] = new Chart(document.getElementById('pieTotalChart'), {
                    type: 'pie',
                    data: { labels: rT[0], datasets: [{ data: rT[1].map(v=>cleanNum(v)), backgroundColor: ["#ef4444", "#3b82f6", "#facc15"], borderWidth: 1 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font:{weight:'bold', size:8}, formatter: (v,ctx)=>ctx.chart.data.labels[ctx.dataIndex] }, legend: { display: false } } }
                });
                document.getElementById('pieTotalLegend').innerHTML = (rT[0]||[]).map((l,i)=>`<div class="flex justify-between border-b pb-1"><span>${l}</span><b>${cleanNum(rT[1][i]).toLocaleString('id-ID')}</b></div>`).join('');
                if(charts['pieDetailChart']) charts['pieDetailChart'].destroy();
                charts['pieDetailChart'] = new Chart(document.getElementById('pieDetailChart'), {
                    type: 'pie',
                    data: { labels: rD[0], datasets: [{ data: rD[1].map(v=>cleanNum(v)), backgroundColor: ["#ef4444", "#3b82f6", "#facc15", "#10b981", "#8b5cf6", "#f97316", "#06b6d4", "#ec4899"], borderWidth: 1 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false }, legend: { display: false } } }
                });
                document.getElementById('pieDetailLegend').innerHTML = (rD[0]||[]).map((l,i)=>`<div class="flex items-center truncate"><span class="legend-box" style="background:${["#ef4444", "#3b82f6", "#facc15", "#10b981", "#8b5cf6", "#f97316", "#06b6d4", "#ec4899"][i]}"></span>${l}</div>`).join('');
            } catch (e) { console.error(e); }
        }

        function refreshAll() {
            document.getElementById('sheetFrame').src = `https://docs.google.com/spreadsheets/d/e/${ID_LAPORAN}/pubhtml?widget=true&headers=false`;
            fetchDonutTop(GID_SMALL_PIE, 'chart1', 'text1', 'legend1');
            fetchSmallBar();
            fetchDonutTop(GID_OLD, 'chart2', 'text2', 'legend2');
            fetchOccupancyCombined();
            fetchHalfFishbox();
            fetchBottomCharts();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('mainContent').style.marginLeft = document.getElementById('sidebar').classList.contains('sidebar-closed') ? "0" : "14rem";
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
