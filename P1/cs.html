<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi 1 - Cold Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        #sidebar { transition: all 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .main-content { transition: margin-left 0.3s ease-in-out; }
        
        /* Efek 3D Lembut & Bayangan */
        .chart-3d-effect {
            filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.15));
        }
        
        .donut-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1rem;
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 240px;
            transition: transform 0.2s ease;
            border: 1px solid #f1f5f9;
        }
        .donut-card:hover { transform: translateY(-5px); }

        .donut-container {
            position: relative;
            width: 105px;
            height: 105px;
            margin: 10px 0;
        }

        .donut-inner-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px; font-weight: 900; color: #1e293b;
        }

        .custom-legend {
            font-size: 10px;
            color: #64748b;
            text-align: center;
            width: 100%;
            padding-top: 8px;
            border-top: 1px dashed #e2e8f0;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-x-hidden">

    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-56 bg-[#1e293b] text-white z-50 shadow-2xl">
        <div class="p-6 text-center border-b border-slate-700">
            <div class="border-2 border-[#4ade80] rounded-md py-1 px-2">
                <span class="text-sm font-black uppercase text-[#4ade80]">PRODUKSI 1</span>
            </div>
        </div>
        <nav class="mt-4 px-2 text-sm">
            <a href="index.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 rounded-md text-gray-400">🏠 Dashboard</a>
            <a href="cs.html" class="flex items-center py-2 px-4 mb-1 bg-[#4ade80] text-black font-bold rounded-md shadow-lg">❄️ Cold Storage</a>
        </nav>
    </aside>

    <main id="mainContent" class="ml-56 p-4 main-content">
        <header class="flex justify-between items-center mb-6 bg-[#1e293b] text-white p-3 rounded-xl border-l-4 border-[#4ade80] shadow-md">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="hover:text-[#4ade80]">☰</button>
                <h1 class="text-lg font-extrabold uppercase tracking-tight">Cold Storage <span class="text-[#4ade80]">Stock Monitor</span></h1>
            </div>
            <button onclick="refreshAll()" class="bg-[#4ade80] text-black px-5 py-1.5 rounded-lg text-[10px] font-black hover:brightness-110 active:scale-95 transition">🔄 REFRESH DATA</button>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8">
            <div class="donut-card">
                <h4 class="text-[11px] font-black text-slate-700 uppercase tracking-tighter">Small Fish</h4>
                <div class="donut-container chart-3d-effect">
                    <canvas id="chart1"></canvas>
                    <div id="text1" class="donut-inner-text">0%</div>
                </div>
                <div id="legend1" class="custom-legend">Memuat data...</div>
            </div>

            <div class="donut-card">
                <h4 class="text-[11px] font-black text-slate-700 uppercase tracking-tighter text-center">Old Stock Ratio</h4>
                <div class="donut-container chart-3d-effect">
                    <canvas id="chart2"></canvas>
                    <div id="text2" class="donut-inner-text">0%</div>
                </div>
                <div id="legend2" class="custom-legend">Memuat data...</div>
            </div>

            <div class="donut-card">
                <h4 class="text-[11px] font-black text-slate-700 uppercase tracking-tighter">Occupancy</h4>
                <div class="donut-container chart-3d-effect">
                    <canvas id="chart3"></canvas>
                    <div id="text3" class="donut-inner-text">0%</div>
                </div>
                <div id="legend3" class="custom-legend">Memuat data...</div>
            </div>

            <div class="donut-card bg-gray-100/50 border-2 border-dashed border-gray-200 opacity-60 flex items-center justify-center text-[10px] text-gray-400 font-bold uppercase">Slot 4</div>
            <div class="donut-card bg-gray-100/50 border-2 border-dashed border-gray-200 opacity-60 flex items-center justify-center text-[10px] text-gray-400 font-bold uppercase">Slot 5</div>
            <div class="donut-card bg-gray-100/50 border-2 border-dashed border-gray-200 opacity-60 flex items-center justify-center text-[10px] text-gray-400 font-bold uppercase">Slot 6</div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-3 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-[10px] uppercase mb-4 text-slate-400 tracking-widest border-b pb-2">Main Inventory Status</h3>
                <div class="h-[300px]"><canvas id="mainBarChart"></canvas></div>
            </div>
            <div class="lg:col-span-1 flex flex-col gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex-1"><canvas id="sidePie1"></canvas></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex-1"><canvas id="sidePie2"></canvas></div>
            </div>
        </div>

        <iframe id="sheetFrame" src="" class="w-full h-[500px] border-none rounded-2xl shadow-lg mt-8 bg-white"></iframe>
    </main>

    <script>
        // MASUKKAN ID DAN GID ANDA DI SINI
        const ID_GSHEET = "2PACX-1vShq3eIcceGMXuR6dBbMut6K99pAQZV4g86Aq5DWkP7yrFTGNMPkdfg4y6vbWeofWpFRO4gGNqLE4h8"; 
        const GID_BAR = "0", GID_TOTAL = "252078912", GID_DETAIL = "1764500224";
        const GID_SMALL = "1052774962", GID_OLD = "885583216", GID_OCCUPANCY = "23039051";
        const ID_LAPORAN = "2PACX-1vRQ6OPRqsuPRmTvAgsJNrU1ISOZ4x-0r1WSmpziuRNdecq42VVxgqferykNrUjJrB-KPWbt_NxgkpFk";


        Chart.register(ChartDataLabels);
        let charts = {};

        async function fetchAndRender(gid, canvasId, textId, legendId) {
            try {
                const t = new Date().getTime();
                const response = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${gid}&range=A1:B3&output=csv&t=${t}`);
                const csv = await response.text();
                const rows = csv.split('\n').map(r => r.split(','));

                // Baris 3 (B3) untuk Persentase Donut
                let rawVal = rows[2][1].replace(/[^\d.,]/g, '').replace(',', '.');
                let val = parseFloat(rawVal);
                let percent = val > 1 ? val / 100 : val;

                renderDonut(canvasId, percent);
                document.getElementById(textId).innerText = (percent * 100).toFixed(1) + '%';

                // Baris 1 & 2 (A1:B2) untuk Legenda
                document.getElementById(legendId).innerHTML = `
                    <div class="flex justify-between font-bold text-slate-700"><span>${rows[0][0]}</span><span>${rows[0][1]}</span></div>
                    <div class="flex justify-between mt-0.5"><span>${rows[1][0]}</span><span>${rows[1][1]}</span></div>
                `;
            } catch (e) { console.error("Gagal ambil data:", e); }
        }

        function renderDonut(id, val) {
            const ctx = document.getElementById(id).getContext('2d');
            if(charts[id]) charts[id].destroy();

            charts[id] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [val, 1 - val < 0 ? 0 : 1 - val],
                        backgroundColor: ['#f97316', '#1e293b'], // Oranye vs Gelap
                        borderWidth: 0,
                        hoverOffset: 12, // Membuat potongan "melompat" saat disentuh
                        borderRadius: 4
                    }]
                },
                options: {
                    cutout: '72%',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 1500, easing: 'easeOutQuart' },
                    plugins: { 
                        datalabels: { display: false },
                        tooltip: { enabled: true }
                    }
                }
            });
        }

        function refreshAll() {
            document.getElementById('sheetFrame').src = `https://docs.google.com/spreadsheets/d/e/${ID_LAPORAN}/pubhtml?widget=true&headers=false`;
            fetchAndRender(GID_SMALL, 'chart1', 'text1', 'legend1');
            fetchAndRender(GID_OLD, 'chart2', 'text2', 'legend2');
            fetchAndRender(GID_OCCUPANCY, 'chart3', 'text3', 'legend3');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('mainContent').style.marginLeft = document.getElementById('sidebar').classList.contains('sidebar-closed') ? "0" : "14rem";
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
