<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi 1 - Cold Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        #sidebar { transition: all 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .main-content { transition: margin-left 0.3s ease-in-out; }
        .chart-3d-effect { filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.15)); }
        .donut-card {
            background: white; border-radius: 1.25rem; padding: 1rem;
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.07);
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; min-height: 250px;
            transition: transform 0.2s ease; border: 1px solid #f1f5f9;
        }
        .special-wide-card { grid-column: span 2; align-items: stretch; overflow: hidden; }
        .donut-container { position: relative; width: 110px; height: 110px; margin: 0 auto; flex-shrink: 0; }
        .donut-inner-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px; font-weight: 900; color: #1e293b; text-align: center; line-height: 1.1;
            width: 100%; pointer-events: none; z-index: 10;
        }
        .donut-inner-text span { font-size: 8px; color: #64748b; font-weight: bold; }
        .custom-legend { font-size: 10px; text-align: center; width: 100%; padding-top: 5px; border-top: 1px dashed #e2e8f0; min-height: 20px; }
        .detail-table { width: 100%; font-size: 9px; border-collapse: collapse; }
        .detail-table th { background: #f8fafc; color: #64748b; font-weight: bold; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .detail-table td { padding: 4px 2px; text-align: center; border-bottom: 1px solid #f1f5f9; color: #1e293b; }
        .chart-table { width: 100%; border-collapse: collapse; font-size: 8px; color: #1e293b; }
        .chart-table th, .chart-table td { border: 1px solid #cbd5e1; padding: 2px; text-align: center; }
        .chart-table th { background-color: #f1f5f9; font-weight: bold; }
        .legend-box { width: 7px; height: 7px; display: inline-block; margin-right: 4px; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-x-hidden">

    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-56 bg-[#1e293b] text-white z-50 shadow-2xl">
        <div class="p-6 text-center border-b border-slate-700">
            <div class="border-2 border-[#4ade80] rounded-md py-1 px-2">
                <span class="text-sm font-black uppercase text-[#4ade80]">PRODUKSI 1</span>
            </div>
        </div>
        <nav class="mt-4 px-2 text-sm">
            <a href="index.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 rounded-md text-gray-400">🏠 Dashboard</a>
            <a href="cs.html" class="flex items-center py-2 px-4 mb-1 bg-[#4ade80] text-black font-bold rounded-md shadow-lg">❄️ Cold Storage</a>
        </nav>
    </aside>

    <main id="mainContent" class="ml-56 p-4 main-content">
        <header class="flex justify-between items-center mb-6 bg-[#1e293b] text-white p-3 rounded-xl border-l-4 border-[#4ade80] shadow-md">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="hover:text-[#4ade80]">☰</button>
                <h1 class="text-lg font-extrabold uppercase tracking-tight">Cold Storage <span class="text-[#4ade80]">Monitor</span></h1>
            </div>
            <button onclick="refreshAll()" class="bg-[#4ade80] text-black px-5 py-1.5 rounded-lg text-[10px] font-black hover:scale-95 transition">🔄 REFRESH</button>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6">
            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-1 text-center">Total Stock Overview</h4>
                <div class="flex items-center justify-center w-full h-full gap-4 px-4">
                    <div class="w-1/2 max-h-[140px] overflow-y-auto">
                        <table class="detail-table">
                            <thead><tr><th>Category</th><th>Value</th></tr></thead>
                            <tbody id="totalStockTableBody"></tbody>
                        </table>
                    </div>
                    <div class="flex-none">
                        <div class="donut-container chart-3d-effect">
                            <canvas id="pieTotalChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-1 text-center">Product Detail Stock</h4>
                <div class="flex items-center justify-center w-full h-full gap-4 px-4">
                    <div class="w-2/3 h-[140px]"><canvas id="barProductDetail"></canvas></div>
                    <div class="flex-none">
                        <div class="donut-container chart-3d-effect">
                            <canvas id="pieDetailChart"></canvas>
                            <div id="textDetailTotal" class="donut-inner-text"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-2 text-center">Small Fish Inventory (MT)</h4>
                <div class="flex items-center justify-center w-full h-full gap-4 px-2">
                    <div class="w-2/3 h-[140px]"><canvas id="barSmallHorizontal"></canvas></div>
                    <div class="flex-none"><div class="donut-container chart-3d-effect"><canvas id="chart1"></canvas><div id="text1" class="donut-inner-text"></div></div></div>
                </div>
                <div id="legend1" class="custom-legend mt-1"></div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-1 text-center">Half Fishbox (Box)</h4>
                <div class="flex items-center justify-center w-full h-full gap-6 px-4">
                    <div class="relative w-1/2 h-[100px]">
                        <div id="legendHalfDetail" class="absolute -top-2 left-0 text-[9px] font-black flex gap-2 z-20"></div>
                        <canvas id="lineHalfTrend"></canvas>
                    </div>
                    <div class="flex-none">
                        <div class="donut-container chart-3d-effect">
                            <canvas id="chartHalfDonut"></canvas>
                            <div id="textHalfTotal" class="donut-inner-text"></div>
                        </div>
                    </div>
                </div>
                <div class="w-full mt-2 border-t border-dashed pt-2">
                    <table class="detail-table">
                        <thead><tr><th>Shape</th><th>OK</th><th>Hold</th><th>Total</th></tr></thead>
                        <tbody id="halfTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-2 text-center">Occupancy Trend (%)</h4>
                <div class="flex items-center justify-center w-full h-full gap-6 px-4">
                    <div class="w-1/2 h-[100px]"><canvas id="lineOccupancyTrend"></canvas></div>
                    <div class="flex-none"><div class="donut-container chart-3d-effect"><canvas id="chart3"></canvas><div id="text3" class="donut-inner-text"></div></div></div>
                </div>
                <div id="legend3" class="custom-legend mt-1"></div>
            </div>

            <div class="donut-card special-wide-card">
                <h4 class="text-[10px] font-black text-slate-700 uppercase mb-1 text-center">Old Stock Monitoring</h4>
                <div class="flex items-center justify-center w-full h-full gap-6 px-4">
                    <div class="w-1/2">
                        <table class="detail-table">
                            <thead><tr><th>Item</th><th>Box</th><th>MT</th></tr></thead>
                            <tbody id="oldTableBody"></tbody>
                        </table>
                    </div>
                    <div class="flex-none">
                        <div class="donut-container chart-3d-effect">
                            <canvas id="chart2"></canvas>
                            <div id="text2" class="donut-inner-text"></div>
                        </div>
                    </div>
                </div>
                <div id="legend2" class="custom-legend mt-1"></div>
            </div>
        </section>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <h3 class="font-bold text-[10px] uppercase mb-4 text-slate-400 border-b pb-2">Main Stock Overview</h3>
            <div class="h-[250px] mb-4"><canvas id="mainBarChart"></canvas></div>
            <div class="overflow-x-auto"><table class="chart-table" id="dataTable"><thead><tr id="tableHeader"></tr></thead><tbody id="tableBody"></tbody></table></div>
        </div>

        <iframe id="sheetFrame" src="" class="w-full h-[500px] border-none rounded-2xl shadow-lg bg-white"></iframe>
    </main>

    <script>
        const ID_GSHEET = "2PACX-1vShq3eIcceGMXuR6dBbMut6K99pAQZV4g86Aq5DWkP7yrFTGNMPkdfg4y6vbWeofWpFRO4gGNqLE4h8";
        const GID_SMALL_PIE = "1052774962", GID_SMALL_BAR = "1026658023";
        const GID_OLD = "885583216", GID_OCCUPANCY = "23039051";
        const GID_HALF = "972941295", GID_BAR = "0";
        const GID_TOTAL = "252078912", GID_DETAIL = "1764500224";
        const ID_LAPORAN = "2PACX-1vRQ6OPRqsuPRmTvAgsJNrU1ISOZ4x-0r1WSmpziuRNdecq42VVxgqferykNrUjJrB-KPWbt_NxgkpFk";

        // Global Chart Defaults
        Chart.register(ChartDataLabels);
        Chart.defaults.set('plugins.datalabels', { display: false }); // Matikan datalabels secara global biar tidak bocor

        let charts = {};

        function isValid(val) {
            return val !== undefined && val !== null && val !== "undefined" && val !== "";
        }

        function cleanNum(val) {
            if(!isValid(val)) return 0;
            let str = val.toString().replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '');
            let n = parseFloat(str);
            return isNaN(n) ? 0 : n;
        }

        function setInner(id, value, suffix) {
            const el = document.getElementById(id);
            if(el) el.innerHTML = `${isValid(value) ? value : '0'}<br><span>${suffix}</span>`;
        }

        async function fetchTopCharts() {
            const t = new Date().getTime();
            try {
                const respT = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_TOTAL}&range=A1:C2&output=csv&t=${t}`);
                const rT = (await respT.text()).split('\n').map(r => r.split(','));
                if(charts['pieTotal']) charts['pieTotal'].destroy();
                charts['pieTotal'] = new Chart(document.getElementById('pieTotalChart'), {
                    type: 'doughnut',
                    data: { labels: rT[0], datasets: [{ data: rT[1].map(v=>cleanNum(v)), backgroundColor: ["#ef4444", "#3b82f6", "#facc15"], borderWidth: 0 }] },
                    options: { cutout: '70%', responsive: true, maintainAspectRatio: false }
                });
                document.getElementById('totalStockTableBody').innerHTML = rT[0].map((l,i)=>`<tr><td>${l}</td><td>${cleanNum(rT[1][i]).toLocaleString('id-ID')}</td></tr>`).join('');

                const respD = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_DETAIL}&range=A1:I2&output=csv&t=${t}`);
                const rD = (await respD.text()).split('\n').map(r => r.split(','));
                let combinedData = rD[0].slice(0, 8)
                    .map((label, i) => ({ label: label, value: cleanNum(rD[1][i]) }))
                    .filter(d => isValid(d.label) && d.label !== "undefined");
                
                combinedData.sort((a, b) => b.value - a.value);
                const maxValDetail = Math.max(...combinedData.map(d => d.value)) * 1.35;

                if(charts['barProduct']) charts['barProduct'].destroy();
                charts['barProduct'] = new Chart(document.getElementById('barProductDetail'), {
                    type: 'bar',
                    data: { labels: combinedData.map(d=>d.label), datasets: [{ data: combinedData.map(d=>d.value), backgroundColor: '#1e293b', borderRadius: 4, barThickness: 10 }] },
                    options: { 
                        indexAxis: 'y', 
                        layout: { padding: { right: 50 } },
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { datalabels: { display: true, anchor: 'end', align: 'right', font: { size: 8, weight: 'bold' }, formatter: v => v.toLocaleString('id-ID') } }, 
                        scales: { x: { display: false, max: maxValDetail }, y: { grid: { display: false }, ticks: { font: { size: 7 } } } } 
                    }
                });

                if(charts['pieDetail']) charts['pieDetail'].destroy();
                charts['pieDetail'] = new Chart(document.getElementById('pieDetailChart'), {
                    type: 'doughnut',
                    data: { labels: combinedData.map(d=>d.label), datasets: [{ data: combinedData.map(d=>d.value), backgroundColor: ["#ef4444", "#3b82f6", "#facc15", "#10b981", "#8b5cf6", "#f97316", "#06b6d4", "#ec4899"], borderWidth: 0 }] },
                    options: { cutout: '70%', responsive: true, maintainAspectRatio: false }
                });
                setInner('textDetailTotal', cleanNum(rD[1][8]).toLocaleString('id-ID'), 'TOTAL');
            } catch (e) { console.error(e); }
        }

        async function fetchSmallBar() {
            try {
                const t = new Date().getTime();
                const resp = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_SMALL_BAR}&range=A2:B7&output=csv&t=${t}`);
                const rows = (await resp.text()).split('\n').map(r => r.split(','));
                let smallData = rows.map(r => ({ label: r[0], value: cleanNum(r[1]) })).filter(d => isValid(d.label) && d.label !== "undefined");
                smallData.sort((a, b) => b.value - a.value);
                const maxValSmall = Math.max(...smallData.map(d => d.value)) * 1.4;

                if(charts['barSmallH']) charts['barSmallH'].destroy();
                charts['barSmallH'] = new Chart(document.getElementById('barSmallHorizontal'), {
                    type: 'bar',
                    data: { labels: smallData.map(d=>d.label), datasets: [{ data: smallData.map(d=>d.value), backgroundColor: '#1e293b', borderRadius: 4, barThickness: 10 }] },
                    options: { 
                        indexAxis: 'y', 
                        layout: { padding: { right: 60 } },
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { datalabels: { display: true, anchor: 'end', align: 'right', font: { size: 8, weight: 'bold' }, formatter: v => v.toLocaleString('id-ID') + ' MT' } }, 
                        scales: { x: { display: false, max: maxValSmall }, y: { grid: { display: false }, ticks: { font: { size: 7 } } } } 
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function fetchHalfFishbox() {
            try {
                const t = new Date().getTime();
                const [respD, respL, respT] = await Promise.all([
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_HALF}&range=A1:B4&output=csv&t=${t}`),
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_HALF}&range=D2:E7&output=csv&t=${t}`),
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_HALF}&range=G2:J4&output=csv&t=${t}`)
                ]);
                const rD = (await respD.text()).split('\n').map(r => r.split(','));
                const datD = [cleanNum(rD[1][1]), cleanNum(rD[2][1]), cleanNum(rD[3][1])];
                setInner('textHalfTotal', cleanNum(rD[0][1]), 'BOX');
                document.getElementById('legendHalfDetail').innerHTML = `<span>OK: ${datD[0]}</span> | <span class="text-orange-600">Hold: ${datD[1]}</span>`;

                if(charts['halfDonut']) charts['halfDonut'].destroy();
                charts['halfDonut'] = new Chart(document.getElementById('chartHalfDonut'), {
                    type: 'doughnut',
                    data: { datasets: [{ data: datD, backgroundColor: ['#10b981', '#facc15', '#ef4444'], borderWidth: 0 }] },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false }
                });

                const rL = (await respL.text()).split('\n').map(r => r.split(','));
                const dOK = rL.map(r => cleanNum(r[0])).reverse();
                const dHold = rL.map(r => cleanNum(r[1])).reverse();
                if(charts['halfLine']) charts['halfLine'].destroy();
                charts['halfLine'] = new Chart(document.getElementById('lineHalfTrend'), {
                    type: 'line',
                    data: { labels: dOK.map(() => ''), datasets: [{ data: dOK, borderColor: '#1e293b', borderWidth: 2, tension: 0.3 }, { data: dHold, borderColor: '#f97316', borderWidth: 2, tension: 0.3 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } } }
                });

                document.getElementById('halfTableBody').innerHTML = (await respT.text()).split('\n').map(r => {
                    const c = r.split(',');
                    return isValid(c[0]) && c[0] !== "undefined" ? `<tr><td>${c[0]}</td><td>${c[1]}</td><td>${c[2]}</td><td class="font-bold">${c[3]}</td></tr>` : '';
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function fetchOccupancyCombined() {
            try {
                const t = new Date().getTime();
                const [respP, respL] = await Promise.all([
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_OCCUPANCY}&range=A1:B3&output=csv&t=${t}`),
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_OCCUPANCY}&range=E2:E7&output=csv&t=${t}`)
                ]);
                const rP = (await respP.text()).split('\n').map(r => r.split(','));
                let pct = cleanNum(rP[2][1]) / 100;
                setInner('text3', (pct * 100).toFixed(1), '%');
                
                const l1 = isValid(rP[0][0]) && rP[0][0] !== "undefined" ? rP[0][0] : "";
                const v1 = isValid(rP[0][1]) && rP[0][1] !== "undefined" ? rP[0][1] : "";
                const l2 = isValid(rP[1][0]) && rP[1][0] !== "undefined" ? rP[1][0] : "";
                const v2 = isValid(rP[1][1]) && rP[1][1] !== "undefined" ? rP[1][1] : "";
                document.getElementById('legend3').innerHTML = `<div class="flex justify-between font-bold"><span>${l1}</span><span>${v1}</span></div><div class="flex justify-between"><span>${l2}</span><span>${v2}</span></div>`;

                if(charts['chart3']) charts['chart3'].destroy();
                charts['chart3'] = new Chart(document.getElementById('chart3'), {
                    type: 'doughnut',
                    data: { datasets: [{ data: [pct, 1-pct], backgroundColor: ['#10b981', '#1e293b'], borderWidth: 0 }] },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false }
                });

                const vL = (await respL.text()).split('\n').map(r => cleanNum(r)).reverse();
                if(charts['lineOcc']) charts['lineOcc'].destroy();
                charts['lineOcc'] = new Chart(document.getElementById('lineOccupancyTrend'), {
                    type: 'line',
                    data: { labels: vL.map(() => ''), datasets: [{ data: vL, borderColor: '#10b981', borderWidth: 2, tension: 0.4 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } } }
                });
            } catch (e) { console.error(e); }
        }

        async function fetchOldStock() {
            try {
                const t = new Date().getTime();
                const [respD, respT] = await Promise.all([
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_OLD}&range=A1:B3&output=csv&t=${t}`),
                    fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_OLD}&range=H2:J5&output=csv&t=${t}`)
                ]);
                const rD = (await respD.text()).split('\n').map(r => r.split(','));
                let pct = cleanNum(rD[2][1]) / 100;
                setInner('text2', (pct * 100).toFixed(1), '%');
                document.getElementById('legend2').innerHTML = `<div class="flex justify-between font-bold"><span>${rD[0][0]}</span><span>${rD[0][1]}</span></div><div class="flex justify-between"><span>${rD[1][0]}</span><span>${rD[1][1]}</span></div>`;
                
                if(charts['chart2']) charts['chart2'].destroy();
                charts['chart2'] = new Chart(document.getElementById('chart2'), {
                    type: 'doughnut',
                    data: { datasets: [{ data: [pct, 1-pct], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0 }] },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false }
                });

                document.getElementById('oldTableBody').innerHTML = (await respT.text()).split('\n').map(r => {
                    const c = r.split(',');
                    return isValid(c[0]) && c[0] !== "undefined" ? `<tr><td>${c[0]}</td><td>${c[1]}</td><td>${c[2]}</td></tr>` : '';
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function fetchBottomBar() {
            try {
                const t = new Date().getTime();
                const csvB = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${GID_BAR}&range=A1:N5&output=csv&t=${t}`).then(r => r.text());
                const rB = csvB.split('\n').map(r => r.split(','));
                const labels = rB[0].slice(1);
                const datasets = [
                    { l: rB[1][0], d: rB[1].slice(1).map(v=>cleanNum(v)), c: "#5b9bd5" },
                    { l: rB[2][0], d: rB[2].slice(1).map(v=>cleanNum(v)), c: "#ed7d31" },
                    { l: rB[3][0], d: rB[3].slice(1).map(v=>cleanNum(v)), c: "#a5a5a5" },
                    { l: rB[4][0], d: rB[4].slice(1).map(v=>cleanNum(v)), c: "#ffc000" }
                ];
                if(charts['mainBarChart']) charts['mainBarChart'].destroy();
                charts['mainBarChart'] = new Chart(document.getElementById('mainBarChart'), {
                    type: 'bar',
                    data: { labels: labels, datasets: datasets.map(s => ({ label: s.l, backgroundColor: s.c, data: s.d.map((v, i) => { let tot = datasets.reduce((a, b) => a + b.d[i], 0); return tot > 0 ? (v / tot) * 100 : 0; }) })) },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { stacked: true, max: 100 }, x: { stacked: true } } }
                });
                document.getElementById('tableHeader').innerHTML = '<th class="border-r">Cat</th>' + labels.map(l=>`<th>${l}</th>`).join('');
                document.getElementById('tableBody').innerHTML = datasets.map(s => `<tr><td class="text-left font-bold border-r px-1"><span class="legend-box" style="background:${s.c}"></span>${s.l}</td>${s.d.map(v=>`<td>${v.toLocaleString('id-ID')}</td>`).join('')}</tr>`).join('');
            } catch (e) { console.error(e); }
        }

        async function fetchDonutPie(gid, canvasId, textId, legendId, isSmall = false) {
            try {
                const t = new Date().getTime();
                const resp = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${gid}&range=A1:B3&output=csv&t=${t}`);
                const rows = (await resp.text()).split('\n').map(r => r.split(','));
                let pct = cleanNum(rows[2][1]) / 100;
                if(charts[canvasId]) charts[canvasId].destroy();
                charts[canvasId] = new Chart(document.getElementById(canvasId), {
                    type: 'doughnut',
                    data: { datasets: [{ data: [pct, 1-pct], backgroundColor: [isSmall?'#f97316':'#3b82f6', '#1e293b'], borderWidth: 0 }] },
                    options: { cutout: '75%', responsive: true, maintainAspectRatio: false }
                });
                setInner(textId, (pct * 100).toFixed(1), isSmall ? 'MT' : '%');
                document.getElementById(legendId).innerHTML = `<div class="flex justify-between font-bold"><span>${rows[0][0]}</span><span>${rows[0][1]}</span></div><div class="flex justify-between"><span>${rows[1][0]}</span><span>${rows[1][1]}</span></div>`;
            } catch (e) { console.error(e); }
        }
