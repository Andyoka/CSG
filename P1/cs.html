<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi 1 - Cold Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        #sidebar { transition: all 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .main-content { transition: margin-left 0.3s ease-in-out; }
        .text-neon-green { color: #4ade80; }
        .bg-neon-green { background-color: #4ade80; }
        .chart-table { width: 100%; border-collapse: collapse; font-size: 8px; color: #1e293b; }
        .chart-table th, .chart-table td { border: 1px solid #cbd5e1; padding: 2px; text-align: center; }
        .chart-table th { background-color: #f1f5f9; font-weight: bold; }
        .legend-box { width: 7px; height: 7px; display: inline-block; margin-right: 4px; border-radius: 2px; }
        .pie-3d-container { filter: drop-shadow(0px 8px 4px rgba(0,0,0,0.15)); }
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #4ade80; border-radius: 50%;
            width: 18px; height: 18px; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-x-hidden">

    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-56 bg-[#1e293b] text-white z-50 shadow-2xl">
        <div class="p-6 text-center border-b border-slate-700">
            <div class="border-2 border-neon-green rounded-md py-1 px-2">
                <span class="text-sm font-black uppercase tracking-tighter text-neon-green">PRODUKSI 1</span>
            </div>
        </div>
        <nav class="mt-4 px-2 text-sm">
            <a href="index.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 transition rounded-md text-gray-400">🏠 Dashboard Utama</a>
            <a href="cs.html" class="flex items-center py-2 px-4 mb-1 bg-neon-green text-black font-bold rounded-md shadow-lg">❄️ Cold Storage</a>
        </nav>
    </aside>

    <main id="mainContent" class="ml-56 p-4 main-content">
        <header class="flex justify-between items-center mb-4 bg-[#1e293b] text-white p-3 rounded-lg shadow-md border-l-4 border-neon-green">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="bg-slate-700 p-2 rounded mr-4 hover:bg-slate-600 transition text-xs">☰ Menu</button>
                <h1 class="text-lg font-bold uppercase tracking-tight">Overview Stock <span class="text-neon-green">CS ATI-1</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="loader" id="loader"></div>
                <button onclick="refreshAll()" class="bg-neon-green text-black px-4 py-1 rounded text-[10px] font-black hover:bg-green-400 transition shadow-md">🔄 REFRESH DATA</button>
            </div>
        </header>

        <div class="flex flex-wrap lg:flex-nowrap gap-4 mb-6 items-stretch">
            <div class="w-full lg:w-[75%] flex flex-col gap-4">
                <section class="bg-white p-4 rounded-xl shadow-lg border border-gray-200">
                    <h3 class="text-center font-bold text-slate-800 mb-2 text-[10px] uppercase border-b pb-1">Visualisasi Overview Stock</h3>
                    <div class="h-[280px] w-full mb-4">
                        <canvas id="stockChart"></canvas>
                    </div>
                    <div class="overflow-x-auto border border-gray-100 rounded-lg">
                        <table class="chart-table" id="dataTable">
                            <thead><tr id="tableHeader" class="bg-slate-100"></tr></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </section>

                <section class="grid grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col items-center">
                        <span class="text-[10px] font-black uppercase text-slate-600 mb-3 text-center">Small Fish</span>
                        <div class="h-28 w-28 relative"><canvas id="donutSmall"></canvas></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col items-center text-center">
                        <span class="text-[10px] font-black uppercase text-slate-600 mb-3">Old Stock</span>
                        <div class="h-28 w-28 relative"><canvas id="donutOld"></canvas></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col items-center text-center">
                        <span class="text-[10px] font-black uppercase text-slate-600 mb-3">Occupancy</span>
                        <div class="h-28 w-28 relative"><canvas id="donutOccupancy"></canvas></div>
                    </div>
                </section>
            </div>

            <div class="w-full lg:w-[25%] flex flex-col gap-4">
                <section class="bg-white p-4 rounded-xl shadow-lg border border-gray-200 flex flex-col flex-1">
                    <h3 class="text-center font-bold text-slate-800 mb-2 text-[9px] uppercase border-b pb-1">Total Stock</h3>
                    <div class="flex-1 flex items-center justify-center pie-3d-container"><canvas id="pieTotalChart"></canvas></div>
                    <div id="pieTotalLegend" class="mt-2 grid grid-cols-1 gap-1"></div>
                </section>
                <section class="bg-white p-4 rounded-xl shadow-lg border border-gray-200 flex flex-col flex-1">
                    <h3 class="text-center font-bold text-slate-800 mb-2 text-[9px] uppercase border-b pb-1">Product Detail (%)</h3>
                    <div class="flex-1 flex items-center justify-center pie-3d-container"><canvas id="pieDetailChart"></canvas></div>
                    <div id="pieDetailLegend" class="mt-2 grid grid-cols-2 gap-1 overflow-y-auto max-h-[80px]"></div>
                </section>
            </div>
        </div>

        <section class="bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden">
            <iframe id="sheetFrame" src="" class="w-full h-[600px] border-none"></iframe>
        </section>
    </main>

    <script>
        const ID_GSHEET = "2PACX-1vShq3eIcceGMXuR6dBbMut6K99pAQZV4g86Aq5DWkP7yrFTGNMPkdfg4y6vbWeofWpFRO4gGNqLE4h8"; 
        const GID_BAR = "0"; 
        const GID_PIE_TOTAL = "252078912"; 
        const GID_PIE_DETAIL = "1764500224";
        // GID Baru untuk 3 Donut
        const GID_SMALL = "1052774962";
        const GID_OLD = "885583216";
        const GID_OCCUPANCY = "23039051";
        const ID_LAPORAN = "2PACX-1vRQ6OPRqsuPRmTvAgsJNrU1ISOZ4x-0r1WSmpziuRNdecq42VVxgqferykNrUjJrB-KPWbt_NxgkpFk"; 


        Chart.register(ChartDataLabels);
        let charts = {};

        // === FUNGSI PEMBERSIH DATA (SOLUSI 0.0%) ===
        function parseValue(raw) {
            if (!raw) return 0;
            // Hapus semua karakter kecuali angka, titik, dan koma
            let clean = raw.toString().replace(/[^\d.,]/g, '');
            // Jika ada koma sebagai pemisah desimal, ubah ke titik
            clean = clean.replace(',', '.');
            let num = parseFloat(clean);
            if (isNaN(num)) return 0;
            
            // Jika angka > 1 (misal 63 atau 96.34), ubah ke desimal (0.63 atau 0.9634)
            return num > 1 ? num / 100 : num;
        }

        function createDonut(id, rawValue, color) {
            const val = parseValue(rawValue);
            const ctx = document.getElementById(id).getContext('2d');
            if (charts[id]) charts[id].destroy();
            
            charts[id] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [val, 1 - val < 0 ? 0 : 1 - val],
                        backgroundColor: [color, '#f1f5f9'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        datalabels: {
                            formatter: () => (val * 100).toFixed(1) + '%',
                            color: '#1e293b', font: { weight: '900', size: 14 },
                            anchor: 'center', align: 'center'
                        },
                        tooltip: { enabled: false }
                    }
                }
            });
        }

        async function fetchData() {
            document.getElementById('loader').style.display = "block";
            const ts = new Date().getTime();
            const fetchC = (gid, range) => fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${gid}&range=${range}&output=csv&t=${ts}`).then(r => r.text());
            
            try {
                // Tarik data B3 secara spesifik
                const [csvBar, csvTotal, csvDetail, csvS, csvO, csvOc] = await Promise.all([
                    fetchC(GID_BAR, "A1:N5"), fetchC(GID_PIE_TOTAL, "A1:C2"), fetchC(GID_PIE_DETAIL, "A1:H2"),
                    fetchC(GID_SMALL, "B3"), fetchC(GID_OLD, "B3"), fetchC(GID_OCCUPANCY, "B3")
                ]);

                // Render Donuts
                createDonut('donutSmall', csvS, '#3b82f6');
                createDonut('donutOld', csvO, '#ef4444');
                createDonut('donutOccupancy', csvOc, '#10b981');

                renderMain(csvBar, csvTotal, csvDetail);
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = "none";
        }

        function renderMain(csvB, csvT, csvD) {
            const rB = csvB.split('\n').map(r => r.split(','));
            const rT = csvT.split('\n').map(r => r.split(','));
            const rD = csvD.split('\n').map(r => r.split(','));

            const barLabels = rB[0].slice(1);
            const barData = { PS: rB[1].slice(1).map(v=>parseFloat(v)||0), PL: rB[2].slice(1).map(v=>parseFloat(v)||0), FIP: rB[3].slice(1).map(v=>parseFloat(v)||0), MSC: rB[4].slice(1).map(v=>parseFloat(v)||0) };
            
            if(charts['stockChart']) charts['stockChart'].destroy();
            charts['stockChart'] = new Chart(document.getElementById('stockChart'), {
                type: 'bar',
                data: {
                    labels: barLabels,
                    datasets: Object.keys(barData).reverse().map((key, i) => ({
                        label: key,
                        data: barData[key].map((val,idx) => {
                            const tot = barData.PS[idx] + barData.PL[idx] + barData.FIP[idx] + barData.MSC[idx];
                            return tot > 0 ? (val/tot)*100 : 0;
                        }),
                        backgroundColor: ["#ffc000", "#a5a5a5", "#ed7d31", "#5b9bd5"][i]
                    }))
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false }, legend: { display: false } }, scales: { y: { stacked: true, max: 100 }, x: { stacked: true } } }
            });

            if(charts['pieTotalChart']) charts['pieTotalChart'].destroy();
            charts['pieTotalChart'] = new Chart(document.getElementById('pieTotalChart'), {
                type: 'pie',
                data: { labels: rT[0], datasets: [{ data: rT[1].map(v=>parseFloat(v)||0), backgroundColor: ["#ef4444", "#3b82f6", "#facc15"], borderWidth: 3, borderColor: '#fff' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font:{weight:'bold'}, formatter: (v,ctx)=>ctx.chart.data.labels[ctx.dataIndex] }, legend: { display: false } } }
            });

            if(charts['pieDetailChart']) charts['pieDetailChart'].destroy();
            charts['pieDetailChart'] = new Chart(document.getElementById('pieDetailChart'), {
                type: 'pie',
                data: { labels: rD[0], datasets: [{ data: rD[1].map(v=>parseFloat(v)||0), backgroundColor: ["#ef4444", "#3b82f6", "#facc15", "#10b981", "#8b5cf6", "#f97316", "#06b6d4"], borderWidth: 2, borderColor:'#fff' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font:{size:8}, formatter: (v,ctx) => { const sum = ctx.dataset.data.reduce((a,b)=>a+b,0); return (v/sum*100).toFixed(1)+'%'; } }, legend: { display: false } } }
            });

            document.getElementById('tableHeader').innerHTML = '<th class="border-r">Cat</th>' + barLabels.map(l=>`<th>${l}</th>`).join('');
            document.getElementById('tableBody').innerHTML = Object.keys(barData).reverse().map((k,i) => `<tr><td class="text-left font-bold border-r px-1"><span class="legend-box" style="background:${["#ffc000","#a5a5a5","#ed7d31","#5b9bd5"][i]}"></span>${k}</td>${barData[k].map(v=>`<td>${Math.round(v).toLocaleString()}</td>`).join('')}</tr>`).join('');
            document.getElementById('pieTotalLegend').innerHTML = rT[0].map((l,i)=>`<div class="flex justify-between text-[10px] border-b pb-1"><span>${l}</span><b>${parseFloat(rT[1][i]).toLocaleString()}</b></div>`).join('');
            document.getElementById('pieDetailLegend').innerHTML = rD[0].map((l,i)=>`<div class="flex items-center text-[8px] truncate"><span class="legend-box" style="background:${["#ef4444", "#3b82f6", "#facc15", "#10b981", "#8b5cf6", "#f97316", "#06b6d4"][i]}"></span>${l}: <b>${Math.round(rD[1][i]).toLocaleString()}</b></div>`).join('');
        }

        function refreshAll() {
            document.getElementById('sheetFrame').src = `https://docs.google.com/spreadsheets/d/e/${ID_LAPORAN}/pubhtml?widget=true&headers=false`;
            fetchData();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('mainContent').style.marginLeft = document.getElementById('sidebar').classList.contains('sidebar-closed') ? "0" : "14rem";
        }

        window.onload = () => { if(!ID_GSHEET.includes("ID_GSHEET")) refreshAll(); };
    </script>
</body>
</html>
