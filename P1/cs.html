<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi 1 - Cold Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        #sidebar { transition: all 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .main-content { transition: margin-left 0.3s ease-in-out; }
        
        /* Efek 3D Lembut & Bayangan */
        .chart-3d-effect {
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }
        
        .donut-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 220px;
        }

        .donut-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin-bottom: 0.5rem;
        }

        .donut-inner-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px; font-weight: 900; color: #1e293b;
        }

        .custom-legend {
            font-size: 10px;
            color: #64748b;
            text-align: center;
            line-height: 1.2;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-56 bg-[#1e293b] text-white z-50 shadow-2xl">
        <div class="p-6 text-center border-b border-slate-700">
            <div class="border-2 border-[#4ade80] rounded-md py-1 px-2">
                <span class="text-sm font-black uppercase text-[#4ade80]">PRODUKSI 1</span>
            </div>
        </div>
        <nav class="mt-4 px-2 text-sm">
            <a href="index.html" class="flex items-center py-2 px-4 mb-1 hover:bg-slate-700 rounded-md text-gray-400">🏠 Dashboard</a>
            <a href="cs.html" class="flex items-center py-2 px-4 mb-1 bg-[#4ade80] text-black font-bold rounded-md shadow-lg">❄️ Cold Storage</a>
        </nav>
    </aside>

    <main id="mainContent" class="ml-56 p-4 main-content">
        <header class="flex justify-between items-center mb-6 bg-[#1e293b] text-white p-3 rounded-lg border-l-4 border-[#4ade80]">
            <h1 class="text-lg font-bold uppercase tracking-tight">Cold Storage <span class="text-[#4ade80]">Live Monitor</span></h1>
            <button onclick="refreshAll()" class="bg-[#4ade80] text-black px-4 py-1 rounded text-[10px] font-black hover:scale-105 transition">🔄 REFRESH</button>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8">
            <div class="donut-card">
                <div class="donut-container chart-3d-effect">
                    <canvas id="chart1"></canvas>
                    <div id="text1" class="donut-inner-text">0%</div>
                </div>
                <div id="legend1" class="custom-legend"></div>
            </div>
            <div class="donut-card">
                <div class="donut-container chart-3d-effect">
                    <canvas id="chart2"></canvas>
                    <div id="text2" class="donut-inner-text">0%</div>
                </div>
                <div id="legend2" class="custom-legend"></div>
            </div>
            <div class="donut-card">
                <div class="donut-container chart-3d-effect">
                    <canvas id="chart3"></canvas>
                    <div id="text3" class="donut-inner-text">0%</div>
                </div>
                <div id="legend3" class="custom-legend"></div>
            </div>
            <div class="donut-card bg-gray-100 border-2 border-dashed border-gray-200 opacity-50"></div>
            <div class="donut-card bg-gray-100 border-2 border-dashed border-gray-200 opacity-50"></div>
            <div class="donut-card bg-gray-100 border-2 border-dashed border-gray-200 opacity-50"></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-3 bg-white p-4 rounded-xl shadow-lg border border-gray-200">
                <h3 class="font-bold text-xs uppercase mb-4 text-slate-500 tracking-widest">Main Stock Overview</h3>
                <div class="h-[300px]"><canvas id="mainBarChart"></canvas></div>
            </div>
            <div class="lg:col-span-1 flex flex-col gap-4">
                <div class="bg-white p-4 rounded-xl shadow-lg flex-1 border border-gray-200">
                    <canvas id="sidePie1"></canvas>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-lg flex-1 border border-gray-200">
                    <canvas id="sidePie2"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIG
        const ID_GSHEET = "2PACX-1vShq3eIcceGMXuR6dBbMut6K99pAQZV4g86Aq5DWkP7yrFTGNMPkdfg4y6vbWeofWpFRO4gGNqLE4h8";
        const GID_1 = "1052774962", GID_2 = "885583216", GID_3 = "23039051";
        
        Chart.register(ChartDataLabels);
        let charts = {};

        // Fungsi khusus mengambil data A1:B2 dan menjadikannya Legenda
        async function fetchDonutData(gid, canvasId, textId, legendId) {
            const t = new Date().getTime();
            const response = await fetch(`https://docs.google.com/spreadsheets/d/e/${ID_GSHEET}/pub?gid=${gid}&range=A1:B3&output=csv&t=${t}`);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));

            // Ambil Nilai Persentase dari baris ke-3 (B3)
            let rawVal = rows[2][1].replace(/[^\d.,]/g, '').replace(',', '.');
            let val = parseFloat(rawVal);
            let percent = val > 1 ? val / 100 : val;

            // Render Chart
            renderDonut(canvasId, percent);
            document.getElementById(textId).innerText = (percent * 100).toFixed(1) + '%';

            // Render Legenda dari A1:B2
            document.getElementById(legendId).innerHTML = `
                <div class="font-bold text-slate-800 uppercase text-[9px]">${rows[0][0]}: ${rows[0][1]}</div>
                <div class="mt-1">${rows[1][0]}: ${rows[1][1]}</div>
            `;
        }

        function renderDonut(id, val) {
            const ctx = document.getElementById(id).getContext('2d');
            if(charts[id]) charts[id].destroy();

            charts[id] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [val, 1 - val],
                        backgroundColor: ['#f97316', '#1e293b'], // Oranye vs Gelap (Sesuai gambar awal)
                        borderWidth: 0,
                        hoverOffset: 10, // Efek membesar saat disentuh
                        borderRadius: 5
                    }]
                },
                options: {
                    cutout: '75%',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { animateScale: true, animateRotate: true },
                    plugins: { 
                        datalabels: { display: false },
                        tooltip: { enabled: true }
                    }
                }
            });
        }

        function refreshAll() {
            fetchDonutData(GID_1, 'chart1', 'text1', 'legend1');
            fetchDonutData(GID_2, 'chart2', 'text2', 'legend2');
            fetchDonutData(GID_3, 'chart3', 'text3', 'legend3');
            // Tambahkan pemanggilan fungsi bar chart lama Anda di sini jika perlu
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('mainContent').style.marginLeft = document.getElementById('sidebar').classList.contains('sidebar-closed') ? "0" : "14rem";
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
